{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-4">🤖 AI Chat</h1>
  <div class="bg-white rounded-xl shadow-sm border border-gray-200">
    <div id="chatMessages" class="h-[60vh] overflow-y-auto p-4 space-y-3 bg-gray-50 rounded-t-xl border-b border-gray-200 text-sm"></div>
    <div class="p-4">
      <div class="flex gap-2">
        <textarea id="chatInput" rows="2" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendStandaloneChat()}" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        <button onclick="sendStandaloneChat()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 self-end">Send</button>
      </div>
      <div class="mt-3 flex gap-2 flex-wrap">
        <button onclick="setChatPrompt('What is the leave policy?')" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs hover:bg-gray-200">Leave Policy</button>
        <button onclick="setChatPrompt('How many days can I apply for?')" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs hover:bg-gray-200">Leave Days</button>
        <button onclick="setChatPrompt('What is the cancellation policy?')" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs hover:bg-gray-200">Cancellation</button>
        <button onclick="setChatPrompt('Show me my leave balance')" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs hover:bg-gray-200">My Balance</button>
      </div>
    </div>
  </div>
</div>
<script>document.title = "Chat - LeaveFlow";</script>
{% endblock %}
